# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # use the pre-existing github actions to check out the code
    - name: Set up Python 3.10
      uses: actions/setup-python@v3 # use the pre-existing github actions to set up python 3.10
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        # install requirements.txt
        pip install -r requirements.txt
    - name: Run Python Script
      run: |
        # run python script
        python extractor.py --file document_for_parsing.pdf
    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login-u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      
    - name: Build Docker image
      run: docker build -t yeeticusmaximus/pdf-extractor:latest .

    - name: Push Docker image
      run: docker push yeeticusmaximus/pdf-extractor:latest
    

    
          
  
